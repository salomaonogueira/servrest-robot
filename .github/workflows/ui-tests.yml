name: UI Tests - ServeRest

on:
  push:
    branches: [main, develop]
    paths:
      - 'tests/ui/**'
      - 'resources/ui/**'
      - 'requirements.txt'
      - '.github/workflows/ui-tests.yml'
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      tags:
        description: 'Tags para filtrar testes (ex: smoke, negativo)'
        required: false
        default: ''
      browser:
        description: 'Navegador para executar os testes'
        required: false
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox

jobs:
  ui-tests:
    name: Executar Testes de UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Instalar Google Chrome
        if: ${{ github.event.inputs.browser != 'firefox' }}
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Instalar Firefox
        if: ${{ github.event.inputs.browser == 'firefox' }}
        uses: browser-actions/setup-firefox@v1

      - name: Instalar GeckoDriver
        if: ${{ github.event.inputs.browser == 'firefox' }}
        uses: browser-actions/setup-geckodriver@latest

      - name: Instalar ChromeDriver
        if: ${{ github.event.inputs.browser != 'firefox' }}
        uses: nanasess/setup-chromedriver@v2

      - name: Executar testes de UI em modo headless
        env:
          HEADLESS: true
          BROWSER: ${{ github.event.inputs.browser || 'chrome' }}
        run: |
          TAGS="${{ github.event.inputs.tags }}"
          if [ -n "$TAGS" ]; then
            robot --outputdir results/ui \
              --variable HEADLESS:true \
              --variable BROWSER:${BROWSER} \
              --include "$TAGS" \
              tests/ui/
          else
            robot --outputdir results/ui \
              --variable HEADLESS:true \
              --variable BROWSER:${BROWSER} \
              tests/ui/
          fi

      - name: Publicar relatório e screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results-${{ github.run_number }}
          path: results/ui/
          retention-days: 30

      - name: Publicar sumário no GitHub
        if: always()
        run: |
          echo "## Resultados dos Testes de UI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f results/ui/output.xml ]; then
            python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('results/ui/output.xml')
          root = tree.getroot()
          stats = root.find('.//statistics/total/stat')
          if stats is not None:
              total = int(stats.get('pass', 0)) + int(stats.get('fail', 0))
              passed = int(stats.get('pass', 0))
              failed = int(stats.get('fail', 0))
              print(f'| Total | Passou | Falhou |')
              print(f'|-------|--------|--------|')
              print(f'| {total} | {passed} | {failed} |')
          " >> $GITHUB_STEP_SUMMARY
          fi
